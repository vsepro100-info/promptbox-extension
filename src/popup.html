<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptBox</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>PromptBox</h1>
        <p class="subtitle" data-i18n="subtitle">Save & reuse AI prompts instantly</p>
      </div>
      <button id="toggleFormBtn" class="primary-btn" data-i18n="addPrompt">+ Add Prompt</button>
    </header>

    <section class="search-section">
      <div class="search-input-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="text"
          id="searchInput"
          data-i18n-placeholder="searchPlaceholder"
          placeholder="Search prompts (title, category, text)..."
          autocomplete="off"
        />
      </div>
    </section>

    <section id="formSection" class="form-section hidden">
      <form id="promptForm">
        <input type="hidden" id="promptId" />

        <label for="titleInput" data-i18n="titleLabel">Title</label>
        <input
          type="text"
          id="titleInput"
          data-i18n-placeholder="titlePlaceholder"
          placeholder="e.g. Rewrite email politely"
          required
        />

        <label for="categoryInput" data-i18n="categoryLabel">Category</label>
        <input
          type="text"
          id="categoryInput"
          data-i18n-placeholder="categoryPlaceholder"
          placeholder="e.g. Writing, Sales, SEO"
        />

        <label for="promptInput" data-i18n="promptLabel">Prompt</label>
        <textarea
          id="promptInput"
          rows="4"
          data-i18n-placeholder="promptPlaceholder"
          placeholder="Paste your prompt here..."
          required
        ></textarea>

        <div class="form-actions">
          <button type="submit" class="primary-btn" id="saveBtn" data-i18n="savePrompt">Save Prompt</button>
          <button type="button" class="secondary-btn" id="cancelBtn" data-i18n="cancel">Cancel</button>
        </div>
      </form>
    </section>

    <section class="list-section">
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-state-title" data-i18n="noPromptsTitle">No prompts yet.</div>
        <div class="empty-state-text" data-i18n="noPromptsText">Start by adding your first prompt.</div>
        <button id="emptyAddBtn" class="primary-btn empty-add-btn" data-i18n="addFirstPrompt">+ Add your first prompt</button>
      </div>
      <div id="noResultsState" class="empty-state hidden">
        <div class="empty-state-title" data-i18n="noResultsTitle">No prompts found</div>
        <div class="empty-state-text" data-i18n="noResultsText">Try a different query or clear the search.</div>
      </div>
      <div id="promptList" class="prompt-list"></div>
    </section>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
